# Optimise Rust compilation speed on Windows by using the LLVM linker (lld)
# instead of the default MSVC link.exe. lld is bundled with the Rust toolchain
# as rust-lld.exe and is significantly faster for large Tauri + dependency graphs.
#
# On macOS/Linux you can also install mold for even faster linking.
# See: https://github.com/rui314/mold

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

[target.x86_64-pc-windows-gnu]
linker = "rust-lld.exe"

[target.aarch64-pc-windows-msvc]
linker = "rust-lld.exe"
