name: Build Windows App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Rust compilation optimisations
  CARGO_INCREMENTAL: "0"           # Disable incremental (avoids cache overhead in clean CI)
  CARGO_NET_RETRY: "3"            # Retry network failures during crate downloads
  RUST_BACKTRACE: "full"          # Full stack traces on panics for debugging

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup sccache (Rust compilation cache)
        uses: mozilla-actions/sccache-action@v0.0.7
        with:
          version: "v0.9.1"

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v2
        id: tauri_build
        with:
          projectPath: apps/desktop
          bundleIdentifier: com.devprojectorganizer.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Dev-Project-Organizer-Windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/*.exe
          retention-days: 30
          if-no-files-found: warn
